agent-id: ""

controller-addr: "127.0.0.1:50051"
analyzer-addr: "127.0.0.1:50052"
analyzer-enabled: true

log-level: "info"

probe-interval-ms: 1000
target-probe-rate-per-second: 10
pinglist-update-interval-sec: 30

data-upload-interval-ms: 10000

traceroute-interval-ms: 0
