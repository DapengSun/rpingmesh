services:
  agent:
    image: rpingmesh-agent:latest
    container_name: rpingmesh-agent-client
    privileged: true
    network_mode: host
    environment:
      # Optional: Environment variables can override config file values
      # If not set, values from agent.yaml will be used
      - RPINGMESH_CONTROLLER_ADDR=${RPINGMESH_CONTROLLER_ADDR:-}
      - RPINGMESH_ANALYZER_ADDR=${RPINGMESH_ANALYZER_ADDR:-}
      - RPINGMESH_ANALYZER_ENABLED=${RPINGMESH_ANALYZER_ENABLED:-}
      # Note: All other configuration should be set in agent.yaml file
    volumes:
      - ${RPINGMESH_DATA_DIR:-./data_dir}/rpingmesh/agent:/private/rpingmesh/agent
      - ./client_config/agent.yaml:/mnt/config-source/agent.yaml:ro
    restart: unless-stopped

  agent-simulator:
    image: rpingmesh-agent-simulator:latest
    container_name: rpingmesh-agent-simulator
    network_mode: host
    volumes:
      - ./client_config/simulator.yaml:/app/config/simulator.yaml:ro
    restart: unless-stopped

