[program:analyzer]
command=/bin/sh -c '/usr/local/bin/analyzer --listen-addr ${LISTEN_ADDR:-0.0.0.0:50052} --database-uri ${DATABASE_URI}'
directory=/app
autostart=true
autorestart=true
startretries=3
user=root
redirect_stderr=true
stdout_logfile=/var/log/supervisor/analyzer.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
