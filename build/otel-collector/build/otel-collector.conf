[program:otel-collector]
command=/usr/local/bin/otelcol --config /app/config/otel-collector-config.yaml
directory=/app
autostart=true
autorestart=true
startretries=3
user=%(ENV_BUILD_USER)s
redirect_stderr=true
stdout_logfile=/var/log/supervisor/otel-collector.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
environment=CONFIG_DIR="/app/config",DATA_DIR="/app/data"

