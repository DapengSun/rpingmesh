# Grafana 配置文件
# 这个配置文件定义了 Grafana 的基本设置和 Prometheus 数据源配置

[paths]
data = /private/rpingmesh/grafana/data
logs = /private/rpingmesh/grafana/logs
plugins = /private/rpingmesh/grafana/plugins
provisioning = /private/rpingmesh/grafana/provisioning

[server]
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s
serve_from_sub_path = true

[database]
type = sqlite3
path = /private/rpingmesh/grafana/data/grafana.db

[session]
provider = file
provider_config = /private/rpingmesh/grafana/data/sessions
cookie_name = grafana_sess
cookie_secure = false
session_life_time = 86400

[analytics]
reporting_enabled = false
check_for_updates = false

[security]
admin_user = admin
admin_password = admin
secret_key = SW2YcwTIb9zpOOhoPsMm

[snapshots]
external_enabled = true

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer
verify_email_enabled = false

[log]
mode = console
level = info

[log.console]
level = info
format = console

[log.file]
level = info
format = text
log_rotate = true
max_lines = 1000000
max_size_shift = 28
daily_rotate = true
max_days = 7
filename = /private/rpingmesh/grafana/logs/grafana.log

[quota]
enabled = false

[unified_alerting]
enabled = true

[explore]
enabled = true

[panels]
disable_sanitize_html = false

[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false

[enterprise]
license_path =

[feature_toggles]
enable = 

[date_formats]
default_timezone = browser
full_date = YYYY-MM-DD HH:mm:ss
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = MM/DD HH:mm
interval_day = MM/DD
interval_month = YYYY-MM
interval_year = YYYY

[expressions]
enabled = true
